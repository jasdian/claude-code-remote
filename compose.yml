services:
  bot:
    build: .
    container_name: claude-crew
    restart: unless-stopped
    environment:
      # Option A: API key (console.anthropic.com)
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # Option B: OAuth credentials are mounted from host below
    volumes:
      - db-data:/data
      # Mount host's Claude credentials (OAuth tokens from ~/.claude/.credentials.json)
      # This lets the container reuse your existing `claude login` session.
      # Supports: Pro/Max subscription OAuth, API keys via env var, or both.
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/home/appuser/.claude:ro
      - ./config.prod.toml:/app/config.toml:ro
      # All cwd paths in config.prod.toml must be under /projects
      - ${PROJECTS_PATH:-/home/you/projects}:/projects
    logging:
      driver: json-file
      options:
        max-size: "4m"
        max-file: "10"

volumes:
  db-data:
