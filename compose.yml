services:
  bot:
    build: .
    container_name: claude-crew
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    volumes:
      - db-data:/data
      - claude-state:/home/appuser/.claude
      - ./config.prod.toml:/app/config.toml:ro
      # All cwd paths in config.prod.toml must be under /projects
      - ${PROJECTS_PATH:-/home/you/projects}:/projects
    logging:
      driver: json-file
      options:
        max-size: "4m"
        max-file: "10"

volumes:
  db-data:
  claude-state:
